kind = "web"
previewPath = "/"
title = "StegaDetect"
version = "1.0.0"
id = "stegano-app-001"

[[services]]
localPort = 8000
name = "StegaDetect"
paths = ["/"]

[services.development]
run = "bash -c 'cd artifacts/stegano-app && pip install -q -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port $PORT --reload'"

[services.development.env]
PORT = "8000"

[services.production]

[services.production.build]
args = ["bash", "-c", "cd artifacts/stegano-app && pip install -r requirements.txt"]

[services.production.run]
args = ["bash", "-c", "cd artifacts/stegano-app && uvicorn main:app --host 0.0.0.0 --port $PORT"]

[services.production.run.env]
PORT = "8000"

[services.production.health.startup]
path = "/health"
